baseURL = "https://rosarysupply.com/"
locale = "en-us"
title = "Catholic Religious Gifts Guide - RosarySupply"
theme = "blowfish"
enableGitInfo = false

# 分页：每页显示文章数
[pagination]
  pagerSize = 9

# 开启 Sitemap 输出（Hugo 原生生成 sitemap.xml）
[outputs]
home = ["HTML", "RSS", "Sitemap"]

# Sitemap 全局默认参数
[sitemap]
changefreq = "weekly"
priority   = 0.6
filename   = "sitemap.xml"

[markup.goldmark.renderer]
unsafe = true
