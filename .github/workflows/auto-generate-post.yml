name: Auto Generate Blog Post

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Read config and pick keyword
        id: config
        run: |
          python3 << 'EOF'
          import yaml, os, glob
          with open('config.yaml', 'r') as f:
              config = yaml.safe_load(f)
          keywords = config.get('keywords', [])
          existing = set()
          for md in glob.glob('content/posts/*.md'):
              with open(md, 'r') as f:
                  for line in f:
                      if line.startswith('keyword:'):
                          val = line.split(':', 1)[1].strip().strip('"').strip("'")
                          existing.add(val)
          available = [k for k in keywords if k not in existing]
          if not available:
              available = keywords
          keyword = available[0]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write
