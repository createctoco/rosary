name: Auto Generate Blog Post

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 0:00 = 北京 8:00
    - cron: '0 6 * * *'    # UTC 6:00 = 北京 14:00
    - cron: '0 12 * * *'   # UTC 12:00 = 北京 20:00
    - cron: '0 18 * * *'   # UTC 18:00 = 北京 2:00
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'content/posts/**'
      - 'assets/images/**'

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Create directories
        run: mkdir -p content/posts assets/images

      # ---- 生成新文章（失败不阻断构建） ----
      - name: Generate blog post
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate-post.py
        continue-on-error: true

      # ---- 提交推送（带重试，失败不阻断构建） ----
      - name: Commit and push new post
        if: steps.generate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ assets/images/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto generate blog post [skip ci]"
          for i in $(seq 1 5); do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 15s..."
            sleep 15
          done
        continue-on-error: true

      # ---- 无论生成是否成功，都重置到 origin/main 再构建 ----
      - name: Reset to origin/main (clean state for build)
        run: git reset --hard origin/main

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: rosarysupply.com
