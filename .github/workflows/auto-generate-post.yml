name: Auto Generate Blog Post

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 0:00 = 北京 8:00
    - cron: '0 6 * * *'    # UTC 6:00 = 北京 14:00
    - cron: '0 12 * * *'   # UTC 12:00 = 北京 20:00
    - cron: '0 18 * * *'   # UTC 18:00 = 北京 2:00
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'content/posts/**'
      - 'assets/images/**'

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- 生成新文章（失败不阻断） ----
      - name: Generate blog post
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          pip install requests pyyaml
          python scripts/generate-post.py
        continue-on-error: true

      # ---- 提交并推送新文章（带重试） ----
      - name: Commit and push new post
        if: steps.generate.outcome == 'success'
        id: commit_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto generate blog post [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              if [ $i -eq 5 ]; then
                echo "All push attempts failed, resetting to origin/main"
                git reset --hard origin/main
                echo "pushed=false" >> $GITHUB_OUTPUT
                exit 0
              fi
              echo "Push attempt $i failed, retrying in 15s..."
              sleep 15
            done
          fi
          echo "pushed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ---- 确保本地与 origin/main 一致 ----
      - name: Reset to origin/main (clean state for build)
        run: git reset --hard origin/main

      # ---- 克隆 Blowfish 主题（不依赖子模块） ----
      - name: Clone Blowfish theme
        run: |
          rm -rf themes/blowfish
          git clone --depth 1 https://github.com/nunocoracao/blowfish.git themes/blowfish

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: rosarysupply.com
