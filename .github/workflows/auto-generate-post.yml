name: Auto Generate Blog Post

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 0:00 = 北京 8:00
    - cron: '0 6 * * *'    # UTC 6:00 = 北京 14:00
    - cron: '0 12 * * *'   # UTC 12:00 = 北京 20:00
    - cron: '0 18 * * *'   # UTC 18:00 = 北京 2:00
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'content/posts/**'
      - 'assets/images/**'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Create directories
        run: mkdir -p content/posts assets/images

      - name: Generate blog post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate-post.py

      - name: Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ assets/images/
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto generate blog post [skip ci]"
          # Retry pull+push up to 5 times to handle race conditions
          for i in $(seq 1 5); do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Push attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.0'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: rosarysupply.com
