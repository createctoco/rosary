{{- /* Footer override: adds footer menu row + nofollow on outbound links */ -}}
<footer class="py-6 sm:py-8 lg:py-10">
  <div class="mx-auto max-w-3xl px-4 lg:px-6 overflow-x-clip">

    {{- /* Footer menu row */ -}}
    <nav class="mb-6 flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm">
      <a href="{{ "/" | relURL }}"
         class="text-neutral-600 hover:text-primary-600 dark:text-neutral-400 dark:hover:text-primary-400 transition-colors">
        Home
      </a>
      <a href="{{ "/posts/" | relURL }}"
         class="text-neutral-600 hover:text-primary-600 dark:text-neutral-400 dark:hover:text-primary-400 transition-colors">
        Posts
      </a>
      <a href="https://ctoco.com/"
         class="text-neutral-600 hover:text-primary-600 dark:text-neutral-400 dark:hover:text-primary-400 transition-colors">
        CTOCO
      </a>
      <a href="https://mecrt.en.alibaba.com/"
         target="_blank" rel="nofollow noopener noreferrer"
         class="text-neutral-600 hover:text-primary-600 dark:text-neutral-400 dark:hover:text-primary-400 transition-colors">
        Alibaba Store
      </a>
    </nav>

    {{- /* Copyright */ -}}
    {{ if site.Params.copyright }}
    <div class="text-center text-xs text-neutral-500 dark:text-neutral-400 mb-2">
      {{ site.Params.copyright | safeHTML }}
    </div>
    {{ end }}

    {{- /* Powered by */ -}}
    <div class="text-center text-xs text-neutral-400 dark:text-neutral-500">
      Powered by
      <a href="https://gohugo.io"
         target="_blank" rel="nofollow noopener noreferrer"
         class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
        Hugo
      </a>
      &amp;
      <a href="https://blowfish.page"
         target="_blank" rel="nofollow noopener noreferrer"
         class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
        Blowfish
      </a>
    </div>

  </div>
</footer>
